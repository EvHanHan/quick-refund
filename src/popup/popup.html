<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1-click navan refund</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <div class="titleRow">
        <h1>1-click navan refund</h1>
      </div>

      <label>
        Provider
        <select id="Provider">
          <option value="orange_provider">Orange</option>
          <option value="sosh_provider">Sosh</option>
          <option value="bouygues_provider">Bouygues</option>
          <option value="sfr_provider">SFR</option>
          <option value="redbysfr_provider">Red by SFR</option>
          <option value="free_provider">Free</option>
          <option value="free_mobile_provider">Free Mobile</option>
          <option value="navigo_provider">Navigo</option>
        </select>
      </label>

      <label>
        Billing type
        <select id="AccountType">
          <option value="home_internet">Internet</option>
          <option value="mobile_internet">Mobile</option>
        </select>
      </label>

      <div class="reminderRow">
        <label class="inlineLabel">
          <input id="MonthlyReminderEnabled" type="checkbox" checked />
          Monthly reminder (first Monday 12:00)
        </label>
      </div>

      <div class="actions">
        <button id="startFlow" class="startFlowButton" aria-label="Refund" title="Refund">
          <span>Refund</span>
        </button>
      </div>

      <div id="instructionBanner" class="instruction hidden"></div>

      <label class="inlineLabel">
        <input id="ShowStatus" type="checkbox" />
        Debug
      </label>

      <section id="statusSection" class="hidden">
        <h2>Status</h2>
        <div id="statusLine">Idle</div>
        <div id="updateStatus">Update check: pending</div>
        <pre id="eventLog"></pre>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
